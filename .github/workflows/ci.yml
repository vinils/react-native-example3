name: CI
on:
  schedule:
    # Runs every Monday at midnight UTC
    - cron: '0 0 * * 1'

  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
      environment:
        description: 'Environment to deploy to'
        type: choice
        options:
        - development
        - staging
        - production

  push:
    paths-ignore:
      - 'docs/**'
      - '.gitignore'
      - '*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '.gitignore'
      - '*.md'
      - 'LICENSE'
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.run_number }}-${{ github.run_attempt }}
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn typecheck

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit tests
        run: yarn test --maxWorkers=2 --coverage

  build-library:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build package
        run: yarn prepare

  build-android:
    runs-on: ubuntu-latest

    env:
      TURBO_CACHE_DIR: .turbo/android

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Generate nitrogen code
        run: yarn nitrogen

      - name: Cache turborepo for Android
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-android-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-android-

      - name: Check turborepo cache for Android
        run: |
          TURBO_CACHE_STATUS=$(node -p "($(yarn turbo run build:android --cache-dir="${{ env.TURBO_CACHE_DIR }}" --dry=json)).tasks.find(t => t.task === 'build:android').cache.status")

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Install JDK
        if: env.turbo_cache_hit != 1
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Finalize Android SDK
        if: env.turbo_cache_hit != 1
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"


      - name: Cache Gradle
        if: env.turbo_cache_hit != 1
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        if: env.turbo_cache_hit != 1
        run: chmod +x example/android/gradlew              

      - name: Build example for Android
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: |
          yarn turbo run build:android --cache-dir="${{ env.TURBO_CACHE_DIR }}"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-outputs
          path: example/android/app/build/outputs/

  build-ios:
    runs-on: macos-15
    
    env:
      XCODE_VERSION: 16.4.0
      TURBO_CACHE_DIR: .turbo/ios
      RCT_USE_RN_DEP: 1
      RCT_USE_PREBUILT_RNCORE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
  
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
  
      - name: Restore dependencies
        id: yarn-cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            **/node_modules
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}-${{ hashFiles('**/package.json', '!node_modules/**') }}
          restore-keys: |
            ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
            ${{ runner.os }}-yarn-
  
      - name: Install dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable
        shell: bash
  
      - name: Cache dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            **/node_modules
            .yarn/install-state.gz
          key: ${{ steps.yarn-cache.outputs.cache-primary-key }}
          
      - name: Generate nitrogen code
        run: yarn nitrogen

      - name: Cache turborepo for iOS
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-ios-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-ios-

      - name: Check turborepo cache for iOS
        run: |
          TURBO_CACHE_STATUS=$(node -p "($(yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}" --dry=json)).tasks.find(t => t.task === 'build:ios').cache.status")

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Use appropriate Xcode version
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install Cocoapods
        run: |
          cd example/ios
          pod install --repo-update
          cd ../..

      - name: Bundle React Native JS
        run: |
          cd example
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/main.jsbundle_assets
          cd ..

      - name: Build example for iOS
        run: |
          yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}" -- -- --configuration Release -sdk iphonesimulator CONFIGURATION_BUILD_DIR="dist/build"

      - name: Find .app path and set variable
        continue-on-error: true
        run: |
          # 1. Search both the project directory and Xcode's system DerivedData folder
          # 2. Narrow it down strictly to the Release-iphonesimulator build target
          APP_PATH=$(find . ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*/Release-iphonesimulator/*" -type d -print -quit)

          ALL_APPS=$(find . -name "*.app" -type d | paste -sd "," -)
          echo "ALL_APPS=$ALL_APPS"
          
          ALL_APPS2=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | paste -sd "," -)
          echo "ALL_APPS2=$ALL_APPS2"

          ALL_APPS3=$(find . ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | paste -sd "," -)
          echo "ALL_APPS3=$ALL_APPS3"
          echo "ALL_APPS3=$ALL_APPS3" >> $GITHUB_OUTPUT

          echo "=== Found the following .app bundles: ==="
          find . -name "*.app" -type d
          echo "========================================="
          
 #     - name: Build example for iOS Device
 #       run: |
 #         xcodebuild \
 #           -workspace example/ios/Example3Example.xcworkspace \
 #           -scheme Example3Example \
 #           -configuration Release \
 #           -sdk iphonesimulator \
 #           -derivedDataPath example/ios/build \
 #           -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.5'

      - name: Embed bundle into .app (safety copy)
        run: |
          APP_DIR="/Users/runner/Library/Developer/Xcode/DerivedData/Example3Example-fziywkvrvlauieetlsniwdnccwcs/Build/Products/Debug-iphonesimulator/Example3Example.app"
          echo "Checking for bundle at $APP_DIR/main.jsbundle"
          # Copy bundle and asset files into the .app if not already embedded
          if [ -f example/ios/main.jsbundle ]; then
            cp example/ios/main.jsbundle "$APP_DIR/" || true
          fi
          if [ -d example/ios/main.jsbundle_assets ]; then
            cp -R example/ios/main.jsbundle_assets/* "$APP_DIR/" || true
          fi
          # Verify
          ls -la "$APP_DIR" | sed -n '1,200p'

      - name: Compress Simulator App
        run: |
          mkdir -p build-output
          cp -R /Users/runner/Library/Developer/Xcode/DerivedData/Example3Example-fziywkvrvlauieetlsniwdnccwcs/Build/Products/Debug-iphonesimulator/Example3Example.app build-output/
          cd build-output
          zip -r ios-simulator.zip Example3Example.app

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build-output/ios-simulator.zip


  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build example for Web
        run: |
          yarn example build:web

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build-outputs
          path: example/dist/
